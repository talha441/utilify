<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilify - All-in-One Web Toolkit</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">Utilify Toolkit</h1>
        <p class="text-sm opacity-90">Free, Fast & Open Source Tools</p>
    </header>

    <main class="max-w-md w-full mx-auto p-4 flex-grow flex flex-col justify-center">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">QR Code Generator</h2>
            
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-2">Enter Text or URL:</label>
                <input type="text" id="qr-input" placeholder="https://example.com" 
                    class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
            </div>

            <button id="generate-btn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-xl transition duration-200 active:scale-95">
                Generate QR Code
            </button>

            <div id="qrcode-wrapper" class="hidden mt-6 flex flex-col items-center justify-center animate-fade-in">
                <div id="qrcode" class="p-3 bg-white border rounded-xl shadow-sm"></div>
                
                <button id="download-btn" 
                    class="mt-4 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg text-sm flex items-center gap-2 transition">
                    Download QR Code
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-3 text-xs">
        <p>&copy; 2026 Utilify Project. Open Source & Community Driven.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
